<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Bowen Zhu</title>
  <desc id="desc">Animated SVG header banner reading Bowen Zhu.</desc>

  <defs>
    <linearGradient id="bannerGradient" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111827">
        <animate attributeName="stop-color" values="#111827;#1f2937;#111827" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="52%" stop-color="#2563eb">
        <animate attributeName="stop-color" values="#2563eb;#0891b2;#2563eb" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#10b981">
        <animate attributeName="stop-color" values="#10b981;#f59e0b;#10b981" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <linearGradient id="textGradient" x1="320" y1="0" x2="880" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#dbeafe" />
      <stop offset="100%" stop-color="#ecfeff" />
    </linearGradient>

    <filter id="softGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.36 0 0 0 0 0.78 0 0 0 0 1 0 0 0 0.55 0" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <pattern id="dotGrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" opacity="0.2" />
    </pattern>
  </defs>

  <rect width="1200" height="320" rx="28" fill="url(#bannerGradient)" />
  <rect width="1200" height="320" rx="28" fill="url(#dotGrid)" opacity="0.55">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="32 0" dur="16s" repeatCount="indefinite" />
  </rect>

  <g opacity="0.24" stroke="#ffffff" stroke-width="2" stroke-linecap="round">
    <path d="M86 250 C232 178 346 286 492 214" stroke-dasharray="520" stroke-dashoffset="520">
      <animate attributeName="stroke-dashoffset" values="520;0;0" keyTimes="0;0.55;1" dur="7s" repeatCount="indefinite" />
    </path>
    <path d="M708 88 C840 24 956 126 1114 58" stroke-dasharray="520" stroke-dashoffset="520">
      <animate attributeName="stroke-dashoffset" values="520;0;0" keyTimes="0;0.55;1" dur="8s" repeatCount="indefinite" />
    </path>
  </g>

  <g filter="url(#softGlow)">
    <text x="600" y="182" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="86" font-weight="800" letter-spacing="3" fill="url(#textGradient)" fill-opacity="0">
      Bowen Zhu
      <animate attributeName="fill-opacity" values="0;1;1" keyTimes="0;0.35;1" dur="3s" fill="freeze" />
    </text>
    <text x="600" y="182" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="86" font-weight="800" letter-spacing="3" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="900" stroke-dashoffset="900">
      Bowen Zhu
      <animate attributeName="stroke-dashoffset" from="900" to="0" dur="2.4s" fill="freeze" />
      <animate attributeName="stroke-opacity" values="1;1;0.35" keyTimes="0;0.82;1" dur="3s" fill="freeze" />
    </text>
  </g>

  <line x1="386" y1="220" x2="814" y2="220" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.75" stroke-dasharray="428" stroke-dashoffset="428">
    <animate attributeName="stroke-dashoffset" from="428" to="0" dur="2s" begin="0.45s" fill="freeze" />
    <animate attributeName="opacity" values="0;0.75;0.45;0.75" keyTimes="0;0.28;0.64;1" dur="5s" repeatCount="indefinite" />
  </line>
</svg>
